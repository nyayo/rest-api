services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8081:8080"
    environment:
      - NODE_ENV=development
      - PORT=8080
      - ORIGIN=http://localhost:8081
    networks:
      - cardmesh

networks:
  cardmesh:
    external: true
